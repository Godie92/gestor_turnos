services:
  - type: web
    name: gestor-turnos
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: flask db upgrade && gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-turnos-db
          property: connectionString
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        sync: false

databases:
  - name: gestor-turnos-db
    plan: free
