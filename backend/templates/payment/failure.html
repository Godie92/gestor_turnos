{% extends 'base.html' %}
{% block title %}Pago pendiente — Salon Pro{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center mt-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-12">
        <div class="text-6xl mb-6">⚠️</div>
        <h2 class="text-2xl font-black text-gray-900 mb-2">Pago no completado</h2>
        <p class="text-gray-500 mb-6">El pago fue cancelado o está pendiente. Podés intentarlo de nuevo cuando quieras.</p>
        <div class="flex gap-3 justify-center">
            <a href="{% url 'payment_checkout' %}"
               class="bg-purple-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-purple-700 transition">
                Reintentar pago
            </a>
            <a href="{% url 'dashboard' %}"
               class="border border-gray-200 text-gray-600 font-medium px-6 py-3 rounded-xl hover:bg-gray-50 transition">
                Volver
            </a>
        </div>
    </div>
</div>
{% endblock %}
