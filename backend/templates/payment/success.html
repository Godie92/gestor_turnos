{% extends 'base.html' %}
{% block title %}Pago exitoso — Salon Pro{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center mt-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-12">
        <div class="text-6xl mb-6">🎉</div>
        <h2 class="text-2xl font-black text-gray-900 mb-2">¡Pago recibido!</h2>
        <p class="text-gray-500 mb-2">Tu membresía está activa.</p>
        {% if membership %}
        <p class="text-sm text-gray-400">Válida hasta el <strong>{{ membership.end_date|date:"d/m/Y" }}</strong></p>
        {% endif %}
        <a href="{% url 'dashboard' %}"
           class="inline-block mt-8 bg-purple-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-purple-700 transition">
            Ir al dashboard
        </a>
    </div>
</div>
{% endblock %}
