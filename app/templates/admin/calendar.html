{% extends 'admin/base_admin.html' %}
{% block title %}Calendario{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
<style>
  .fc-event { cursor:pointer; font-size:.8rem; }
  .fc-toolbar-title { font-size:1.1rem !important; font-weight:700; }
  #event-modal {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
    z-index:9999; align-items:center; justify-content:center;
  }
  #event-modal.open { display:flex; }
  #event-modal-box {
    background:#fff; border-radius:12px; padding:1.5rem;
    max-width:400px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,.2);
  }
</style>
{% endblock %}

{% block content %}
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem">
    <h1 class="page-title" style="margin-bottom:0">🗓️ Calendario</h1>
    {% if professionals %}
    <select id="pro-filter" class="form-control" style="max-width:200px">
      <option value="">Todos los profesionales</option>
      {% for p in professionals %}
      <option value="{{ p.id }}">{{ p.name }}</option>
      {% endfor %}
    </select>
    {% endif %}
  </div>

  <div class="card" style="padding:1rem">
    <div id="calendar"></div>
  </div>
</div>

<div id="event-modal">
  <div id="event-modal-box">
    <h3 id="modal-title" style="margin-bottom:1rem;font-size:1.1rem"></h3>
    <div id="modal-body" style="display:flex;flex-direction:column;gap:.5rem;font-size:.95rem"></div>
    <div style="margin-top:1.25rem;text-align:right">
      <button onclick="closeModal()" class="btn btn-ghost btn-sm">Cerrar</button>
      <a id="modal-link" href="#" class="btn btn-primary btn-sm">Ver turnos del día</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script>
const EVENTS_URL = '{{ url_for("admin.calendar_events", slug=tenant.slug) }}';
const APPTS_URL  = '{{ url_for("admin.appointments",    slug=tenant.slug) }}';

document.addEventListener('DOMContentLoaded', function () {
  const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'timeGridWeek',
    locale: 'es',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay'
    },
    slotMinTime: '07:00',
    slotMaxTime: '22:00',
    allDaySlot: false,
    height: 'auto',
    nowIndicator: true,
    eventSources: [{ url: EVENTS_URL, extraParams: getParams }],
    eventClick: function (info) { showModal(info.event); },
    eventDidMount: function (info) {
      const p = info.event.extendedProps;
      info.el.title = p.status + ' · ' + p.phone + (p.notes ? '\n' + p.notes : '');
    },
  });
  cal.render();

  const proFilter = document.getElementById('pro-filter');
  if (proFilter) proFilter.addEventListener('change', () => cal.refetchEvents());
});

function getParams() {
  const f = document.getElementById('pro-filter');
  return f ? { professional_id: f.value } : {};
}

function showModal(event) {
  const p = event.extendedProps;
  document.getElementById('modal-title').textContent = event.title;
  const start = event.start;
  const isoDate = start.toISOString().slice(0, 10);
  const dateStr = start.toLocaleDateString('es-AR');
  const timeStr = start.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  let html = '<div>📅 <strong>' + dateStr + '</strong> a las <strong>' + timeStr + '</strong> hs</div>'
           + '<div>📊 Estado: ' + p.status + '</div>'
           + '<div>📱 Teléfono: ' + p.phone + '</div>';
  if (p.professional) html += '<div>👩 Profesional: ' + p.professional + '</div>';
  if (p.notes)        html += '<div>📝 ' + p.notes + '</div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-link').href = APPTS_URL + '?date=' + isoDate;
  document.getElementById('event-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('event-modal').classList.remove('open');
}

document.getElementById('event-modal').addEventListener('click', function (e) {
  if (e.target === this) closeModal();
});
</script>
{% endblock %}
